# fly.toml app configuration file generated for f1-live-api on 2026-03-07T16:22:13+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'f1-live-api'
primary_region = 'lhr'

[build]

[env]
  DATA_DIR = '/data'
  PORT = '3000'

[[mounts]]
  source = 'f1_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
